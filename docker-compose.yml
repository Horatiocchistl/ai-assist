services:
  computerui:
    build: .
    ports:
      - "5173:5173"
      - "3001:3001"
    volumes:
      - ~/.agents/skills:/home/node/.agents/skills:ro
      - ./.agents/skills:/app/.agents/skills:ro
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - NODE_ENV=development
    extra_hosts:
      - "host.docker.internal:host-gateway"
